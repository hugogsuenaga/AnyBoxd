<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AnyBoxd</title>

    <script src="/js/sessao.js"></script>
    <script src="/js/posts.js"></script>

    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/stars.css" />
    <link rel="stylesheet" href="/css/posts.css" />
  </head>

  <body>
    <div class="backdrop"></div>
    <div id="header-placeholder"></div>
        </div>
    <main>
      <div id="starL-placeholder"></div>
      <div id="posts-placeholder"></div>
      <div id="starR-placeholder"></div>
    </main>
  </body>
</html>
<script>
  fetch("/view/includes/header_logged.html")
    .then((res) => res.text())
    .then((data) => {
      document.getElementById("header-placeholder").innerHTML = data;
    });

  fetch("/view/includes/starL.html")
    .then((res) => res.text())
    .then((data) => {
      document.getElementById("starL-placeholder").innerHTML = data;
    });

  fetch("/view/includes/starR.html")
    .then((res) => res.text())
    .then((data) => {
      document.getElementById("starR-placeholder").innerHTML = data;
    });

  window.onload = function() {
            obterPostsDoServidor();
        };

        function obterPostsDoServidor() {
            fetch("/posts/orderByTime", {
                method: "GET"
            })
            .then(function (resposta) {
                if (resposta.ok) {
                    resposta.json().then(function (dados) {
                        console.log("Dados recebidos");

                        exibirPosts(dados);
                    });
                } else {
                    console.error("Erro na requisição!");
                }
            })
            .catch(function (erro) {
                console.error("Erro de rede: ", erro);
            });
        }
</script>
