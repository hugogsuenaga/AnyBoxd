<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sign Up</title>

    <script src="/js/sessao.js"></script>
    <script src="/js/estrelas.js"></script>
    <script src="/js/signup.js"></script>

    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/auth.css" />
    <link rel="stylesheet" href="./css/stars.css" />
  </head>

  <body>
    <div class="backdrop"></div>
    <div id="header-placeholder"></div>

    <main>
      <div id="starL-placeholder"></div>
      <div class="div_auth">
        <form action="/singup" method="post">
          <p>Sign Up</p>
          <input type="text" id="ipt_nome" placeholder="Nome Completo" /><br />
          <input
            type="text"
            id="ipt_username"
            placeholder="Nome de Usuario"
          /><br />
          <input type="text" id="ipt_email" placeholder="Email" />
          <input type="password" id="ipt_senha" placeholder="Senha" />
          <button type="button" onclick="cadastrar()">Sign Up</button>
          <h3>Ja tem uma conta? faça o <a href="/login">login</a></h3>
          <div id="div_alerta" style="color: red; font-weight: bold"></div>
          <br />
        </form>
      </div>
      <div id="starR-placeholder"></div>
    </main>
  </body>
</html>
<script>
  window.onload = headerSessao()
  window.onload = estrelas()
</script>
